name: CI Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
      - name: Setup Golang
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
      - name: Build
        run: make build
      - name: Test
        run: go test ./...
